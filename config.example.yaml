# SmallTalk 설정 예시 파일
# 이 파일을 config.yaml로 복사한 뒤, 실제 값을 채워서 사용하세요.

# 오케스트레이터 (플래너 겸 메인 에이전트) LLM 설정
orchestrator:
  base_url: "https://openrouter.ai/api/v1"
  api_key: "sk-or-your-api-key-here"
  model: "qwen/qwen3.5-30b-a3b"
  temperature: 0.7
  max_tokens: 4096

# 워커 (서브 에이전트) LLM 설정
worker:
  base_url: "https://openrouter.ai/api/v1"
  api_key: "sk-or-your-api-key-here"
  model: "qwen/qwen3.5-4b"
  temperature: 0.5
  max_tokens: 2048

# 에이전트 동작 설정
agent:
  max_loop_iterations: 10

# 활성화할 인터페이스 목록
# 각 인터페이스에서 공통으로 사용 가능한 필터 옵션:
#   allowed_users:     허용 사용자 ID 목록 (비어있으면 모두 허용)
#   blocked_users:     차단 사용자 ID 목록
#   allowed_chatrooms: 허용 채팅방/채널 ID 목록 (비어있으면 모든 채팅방 허용)

interfaces:
  - type: cli

  # - type: telegram
  #   token: "123456789:ABCdefGHIjklMNOpqrsTUVwxyz"
  #   allowed_users: [12345678, 87654321]
  #   blocked_users: []
  #   allowed_chatrooms: [-1001234567890]

  # - type: discord
  #   token: "MTIzNDU2Nzg5MDEyMzQ1Njc4OQ.Abc123.abcdefghijklmnopqrstuvwxyz"
  #   allowed_users: ["123456789012345678"]
  #   blocked_users: []
  #   allowed_chatrooms: ["987654321098765432"]
